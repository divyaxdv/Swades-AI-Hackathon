services:
  - type: web
    runtime: docker
    name: transcription-server
    plan: free
    dockerfilePath: ./Dockerfile.server
    preDeployCommand: cd packages/db && bunx drizzle-kit push
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: transcription-db
          property: connectionString
      - key: CORS_ORIGIN
        sync: false
      - key: NODE_ENV
        value: production
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: MINIO_ENDPOINT
        sync: false
      - key: MINIO_ACCESS_KEY
        sync: false
      - key: MINIO_SECRET_KEY
        sync: false
      - key: MINIO_BUCKET
        sync: false

databases:
  - name: transcription-db
    plan: free

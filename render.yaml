services:
  # Hono API server (Bun)
  - type: web
    runtime: docker
    name: transcription-server
    dockerfilePath: ./Dockerfile.server
    preDeployCommand: cd packages/db && bunx drizzle-kit push
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: transcription-db
          property: connectionString
      - key: CORS_ORIGIN
        sync: false
      - key: NODE_ENV
        value: production
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: MINIO_ENDPOINT
        value: http://minio:9000
      - key: MINIO_ACCESS_KEY
        fromService:
          name: minio
          type: pserv
          envVarKey: MINIO_ROOT_USER
      - key: MINIO_SECRET_KEY
        fromService:
          name: minio
          type: pserv
          envVarKey: MINIO_ROOT_PASSWORD
      - key: MINIO_BUCKET
        value: recordings

  # MinIO object storage (private, not public)
  - type: pserv
    runtime: docker
    name: minio
    image:
      url: docker.io/minio/minio:latest
    dockerCommand: server /data --console-address ":9001"
    envVars:
      - key: MINIO_ROOT_USER
        value: minioadmin
      - key: MINIO_ROOT_PASSWORD
        generateValue: true
    disk:
      name: minio-data
      mountPath: /data
      sizeGB: 10

databases:
  - name: transcription-db
    plan: free
